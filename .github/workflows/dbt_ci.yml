name: dbt CI

on:
  pull_request:
    branches: [main]
    paths:
      - "dbt/**"

permissions:
  contents: read
  id-token: write

jobs:
  dbt_build_and_test:
    runs-on: ubuntu-latest

    env:
      GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/935110387855/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider
          service_account: campaignpulse-runner@project-70a69ac8-3bfe-400d-9c8.iam.gserviceaccount.com

      - name: Write CI profiles.yml
        run: |
          cat > dbt/profiles.yml << 'EOF'
          campaignpulse:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: oauth
                project: "{{ env_var('GCP_PROJECT_ID') }}"
                dataset: campaignpulse_ci
                location: US
                threads: 4
                priority: interactive
                maximum_bytes_billed: 1000000000
          EOF

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt
        run: |
          pip install dbt-core==1.8.0 dbt-bigquery==1.8.0

      - name: dbt deps
        working-directory: dbt
        run: dbt deps --profiles-dir . --target ci

      - name: dbt seed
        working-directory: dbt
        run: dbt seed --profiles-dir . --target ci

      - name: dbt run
        working-directory: dbt
        run: dbt run --profiles-dir . --target ci

      - name: dbt test
        working-directory: dbt
        run: dbt test --profiles-dir . --target ci